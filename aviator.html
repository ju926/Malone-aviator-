<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aviator Demo</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f1a;
  color: white;
  text-align: center;
}

.container {
  padding: 20px;
}

h1 {
  color: #ff3c3c;
}

#multiplier {
  font-size: 60px;
  margin: 20px 0;
}

canvas {
  background: #111827;
  border-radius: 10px;
  margin-top: 10px;
}

button {
  padding: 15px 30px;
  margin: 10px;
  border: none;
  border-radius: 8px;
  font-size: 18px;
  cursor: pointer;
}

#startBtn {
  background: #00c853;
  color: white;
}

#cashOutBtn {
  background: #ff9800;
  color: white;
}

#balance {
  margin-top: 10px;
  font-size: 20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Aviator Demo</h1>

  <div id="multiplier">1.00x</div>

  <canvas id="graph" width="300" height="200"></canvas>

  <br>

  <button id="startBtn">Start</button>
  <button id="cashOutBtn" disabled>Cash Out</button>

  <div id="balance">Balance: 1000</div>
</div>

<script>
let multiplier = 1.00;
let crashPoint = 0;
let interval;
let playing = false;
let balance = 1000;
let bet = 100;
let cashedOut = false;

const multiplierText = document.getElementById("multiplier");
const startBtn = document.getElementById("startBtn");
const cashOutBtn = document.getElementById("cashOutBtn");
const balanceText = document.getElementById("balance");

const canvas = document.getElementById("graph");
const ctx = canvas.getContext("2d");

let x = 0;

function drawGraph() {
  ctx.lineTo(x, canvas.height - multiplier * 10);
  ctx.strokeStyle = "#00e5ff";
  ctx.stroke();
  x += 2;
}

function startGame() {
  if (playing) return;

  if (balance < bet) {
    alert("Not enough balance!");
    return;
  }

  balance -= bet;
  updateBalance();

  playing = true;
  cashedOut = false;
  multiplier = 1.00;
  crashPoint = Math.random() * 8 + 1.5;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.beginPath();
  ctx.moveTo(0, canvas.height);

  x = 0;

  cashOutBtn.disabled = false;

  interval = setInterval(() => {
    multiplier += 0.02;
    multiplierText.innerText = multiplier.toFixed(2) + "x";

    drawGraph();

    if (multiplier >= crashPoint) {
      endGame(false);
    }

  }, 50);
}

function cashOut() {
  if (!playing || cashedOut) return;

  let win = bet * multiplier;
  balance += win;
  updateBalance();

  cashedOut = true;
  endGame(true);
}

function endGame(won) {
  clearInterval(interval);
  playing = false;
  cashOutBtn.disabled = true;

  if (!won && !cashedOut) {
    multiplierText.innerText = "CRASH 💥";
  }
}

function updateBalance() {
  balanceText.innerText = "Balance: " + balance.toFixed(2);
}

startBtn.onclick = startGame;
cashOutBtn.onclick = cashOut;
</script>

</body>
  </html>
