<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malone Aviator - Login</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

/* Body & Background */
body {
  margin: 0;
  font-family: 'Roboto', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(-45deg, #0f0f0f, #1a1a1a, #111, #222);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
  color: white;
}

@keyframes gradientBG {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

/* Container */
.container {
  background: #111;
  padding: 40px 30px;
  border-radius: 25px;
  box-shadow: 0 0 30px #ff9a00;
  width: 360px;
  text-align: center;
  transition: transform 0.3s ease;
}
.container:hover {
  transform: translateY(-5px);
}

/* Logo & Title */
#logo {
  width: 80px;
  height: 80px;
  margin: 0 auto 10px auto;
  display: block;
}
h2 {
  color: #ff9a00;
  margin-bottom: 20px;
  text-shadow: 0 0 10px #ff9a00;
}

/* Inputs */
input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 15px;
  border: none;
  font-size: 16px;
  outline: none;
  background: #222;
  color: white;
  transition: 0.3s;
  box-shadow: 0 0 5px #000;
}
input:focus {
  box-shadow: 0 0 10px #ff9a00;
  background: #1a1a1a;
}

/* Buttons */
button {
  width: 100%;
  padding: 14px;
  border-radius: 25px;
  border: none;
  background: #ff9a00;
  color: white;
  font-weight: bold;
  font-size: 18px;
  margin-top: 15px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 10px #ff9a00;
}
button:hover {
  background: #ffaa33;
  box-shadow: 0 0 20px #ffaa33;
}

/* Switch Links */
.switch {
  margin-top: 15px;
  font-size: 14px;
  color: #aaa;
  cursor: pointer;
}
.switch span {
  color: #ff9a00;
  text-decoration: underline;
}

/* Error Messages */
.error {
  color: #ff5252;
  font-size: 14px;
  margin-top: 5px;
  height: 18px;
}

/* Fade Animation */
.fade {
  animation: fadeIn 0.5s ease forwards;
}
@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}

/* Responsive */
@media(max-width:400px){
  .container {width: 90%; padding: 30px 20px;}
  input {padding:12px;}
  button {padding:12px;}
}
</style>
</head>
<body>

<div class="container fade" id="loginContainer">
  <!-- Logo Section -->
  <img src="logo.png" alt="Malone Aviator Logo" id="logo">
  <h2 id="formTitle">Login</h2>

  <!-- Login Form -->
  <div id="loginForm">
    <input type="text" id="loginPhone" placeholder="Kenya Phone Number (10 digits)">
    <div class="error" id="loginError"></div>
    <button onclick="login()">Login</button>
    <div class="switch">Don't have an account? <span onclick="showRegister()">Register</span></div>
  </div>

  <!-- Registration Form -->
  <div id="registerForm" style="display:none;">
    <input type="text" id="firstName" placeholder="First Name">
    <input type="text" id="secondName" placeholder="Second Name">
    <input type="text" id="nickname" placeholder="Nickname">
    <input type="text" id="phone" placeholder="Kenya Phone Number (10 digits)">
    <div class="error" id="registerError"></div>
    <button onclick="register()">Register</button>
    <div class="switch">Already have an account? <span onclick="showLogin()">Login</span></div>
  </div>

  <!-- Footer -->
  <div style="margin-top:20px; font-size:12px; color:#aaa;">© 2026 Malone Aviator</div>
</div>

<script>
// Form switches with fade
function showRegister() {
  document.getElementById('loginForm').style.display='none';
  document.getElementById('registerForm').style.display='block';
  document.getElementById('formTitle').innerText='Register';
}
function showLogin() {
  document.getElementById('loginForm').style.display='block';
  document.getElementById('registerForm').style.display='none';
  document.getElementById('formTitle').innerText='Login';
}

// Registration
function register() {
  const firstName=document.getElementById('firstName').value.trim();
  const secondName=document.getElementById('secondName').value.trim();
  const nickname=document.getElementById('nickname').value.trim();
  const phone=document.getElementById('phone').value.trim();
  const errorDiv=document.getElementById('registerError');

  if(!firstName || !secondName || !nickname || !phone) {
    errorDiv.innerText='Please fill all fields';
    return;
  }
  if(!/^\d{10}$/.test(phone)) {
    errorDiv.innerText='Phone must be 10 digits';
    return;
  }
  if(localStorage.getItem(phone)) {
    errorDiv.innerText='Phone already registered';
    return;
  }
  const userData={firstName, secondName, nickname, phone, balance:1000};
  localStorage.setItem(phone, JSON.stringify(userData));
  alert('Registered successfully! Now login.');
  showLogin();
  errorDiv.innerText='';
}

// Login
function login() {
  const phone=document.getElementById('loginPhone').value.trim();
  const errorDiv=document.getElementById('loginError');

  if(!/^\d{10}$/.test(phone)) {
    errorDiv.innerText='Enter valid 10-digit phone number';
    return;
  }
  const data=localStorage.getItem(phone);
  if(!data) {
    errorDiv.innerText='Phone not registered';
    return;
  }
  localStorage.setItem('currentUser', phone);
  alert('Login successful! Redirecting...');
  window.location.href='game.html'; // redirect to your Aviator game page
}
</script>

</body>
</html>
