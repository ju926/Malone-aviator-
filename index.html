<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malone Aviator</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>

/* ===== BODY ===== */
body {
  margin: 0;
  font-family: 'Roboto', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(-45deg, #0f0f0f, #1a1a1a, #111, #222);
  background-size: 400% 400%;
  animation: gradientBG 20s ease infinite;
  color: white;
  overflow: hidden;
}

@keyframes gradientBG {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

/* ===== PARTICLES CANVAS ===== */
#particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* ===== CONTAINER ===== */
.container {
  position: relative;
  z-index: 1;
  background: rgba(17,17,17,0.65);
  backdrop-filter: blur(12px);
  border-radius: 30px;
  box-shadow: 0 0 40px rgba(255,154,0,0.6);
  width: 380px;
  max-width: 90%;
  text-align: center;
  padding: 50px 30px;
  transition: 0.3s;
}

.container:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 60px rgba(255,170,50,0.9);
}

/* ===== LOGO ===== */
#logo {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  box-shadow: 0 0 20px #ff9a00;
  animation: pulse 3s infinite alternate;
}

@keyframes pulse {
  from { transform: scale(1); }
  to { transform: scale(1.05); }
}

h2 {
  color: #ff9a00;
  text-shadow: 0 0 15px #ff9a00;
}

/* ===== INPUT ===== */
input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 20px;
  border: none;
  background: #222;
  color: white;
  outline: none;
  transition: 0.3s;
}

input:focus {
  box-shadow: 0 0 12px #ff9a00;
}

/* ===== BUTTON ===== */
button {
  width: 100%;
  padding: 14px;
  border-radius: 25px;
  border: none;
  background: linear-gradient(45deg,#ff9a00,#ffaa33);
  color: white;
  font-weight: bold;
  font-size: 18px;
  cursor: pointer;
  margin-top: 10px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px #ffaa33;
}

/* ===== SWITCH ===== */
.switch {
  margin-top: 10px;
  font-size: 14px;
}

.switch span {
  color: #ff9a00;
  cursor: pointer;
}

/* ===== ERROR ===== */
.error {
  color: red;
  font-size: 13px;
  height: 18px;
  opacity: 0;
  transition: 0.3s;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
<img src="logo.png" id="logo">
<h2 id="title">Login</h2>

<div id="loginForm">
<input type="text" id="loginPhone" placeholder="Kenya Phone (10 digits)">
<div class="error" id="loginError"></div>
<button onclick="login()">Login</button>
<div class="switch">No account? <span onclick="showRegister()">Register</span></div>
</div>

<div id="registerForm" style="display:none;">
<input type="text" id="firstName" placeholder="First Name">
<input type="text" id="secondName" placeholder="Second Name">
<input type="text" id="nickname" placeholder="Nickname">
<input type="text" id="phone" placeholder="Kenya Phone (10 digits)">
<div class="error" id="regError"></div>
<button onclick="register()">Register</button>
<div class="switch">Have account? <span onclick="showLogin()">Login</span></div>
</div>

</div>

<script>

/* ===== SWITCH ===== */
function showRegister(){
  document.getElementById("loginForm").style.display="none";
  document.getElementById("registerForm").style.display="block";
  document.getElementById("title").innerText="Register";
}

function showLogin(){
  document.getElementById("loginForm").style.display="block";
  document.getElementById("registerForm").style.display="none";
  document.getElementById("title").innerText="Login";
}

/* ===== REGISTER ===== */
function register(){
  let f=document.getElementById("firstName").value;
  let s=document.getElementById("secondName").value;
  let n=document.getElementById("nickname").value;
  let p=document.getElementById("phone").value;
  let e=document.getElementById("regError");

  if(!f||!s||!n||!p){
    e.innerText="Fill all fields"; e.style.opacity=1; return;
  }
  if(!/^\d{10}$/.test(p)){
    e.innerText="Invalid phone"; e.style.opacity=1; return;
  }
  if(localStorage.getItem(p)){
    e.innerText="Already registered"; e.style.opacity=1; return;
  }

  localStorage.setItem(p,JSON.stringify({f,s,n,p,balance:1000}));
  alert("Registered!");
  showLogin();
}

/* ===== LOGIN ===== */
function login(){
  let p=document.getElementById("loginPhone").value;
  let e=document.getElementById("loginError");

  if(!/^\d{10}$/.test(p)){
    e.innerText="Invalid phone"; e.style.opacity=1; return;
  }
  if(!localStorage.getItem(p)){
    e.innerText="Not registered"; e.style.opacity=1; return;
  }

  localStorage.setItem("currentUser",p);
  window.location="game.html";
}

/* ===== PARTICLES ===== */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*2,
    speed:Math.random()*0.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#ff9a00";

  particles.forEach(p=>{
    p.y+=p.speed;
    if(p.y>canvas.height) p.y=0;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
