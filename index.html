<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malone Aviator - Login</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
/* ================= Body & Background ================= */
body {
  margin: 0;
  font-family: 'Roboto', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(-45deg, #0f0f0f, #1a1a1a, #111, #222);
  background-size: 400% 400%;
  animation: gradientBG 20s ease infinite;
  color: white;
  overflow: hidden;
}

@keyframes gradientBG {
  0% { background-position:0% 50%; }
  50% { background-position:100% 50%; }
  100% { background-position:0% 50%; }
}

/* ================= Container (Glassmorphism) ================= */
.container {
  background: rgba(17,17,17,0.65);
  backdrop-filter: blur(12px);
  border-radius: 30px;
  box-shadow: 0 0 30px rgba(255,154,0,0.6);
  width: 380px;
  max-width: 90%;
  text-align: center;
  padding: 50px 30px;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  position: relative;
}

.container:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 50px rgba(255,170,50,0.8);
}

/* ================= Logo & Title ================= */
#logo {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  margin: 0 auto 15px auto;
  display: block;
  box-shadow: 0 0 20px #ff9a00;
  transition: transform 0.6s ease, box-shadow 0.6s ease;
  animation: logoPulse 3s infinite alternate;
}

@keyframes logoPulse {
  0% { transform: scale(1); box-shadow: 0 0 15px #ff9a00; }
  100% { transform: scale(1.05); box-shadow: 0 0 30px #ffaa33; }
}

h2 {
  color: #ff9a00;
  margin-bottom: 25px;
  font-weight: 700;
  font-size: 28px;
  text-shadow: 0 0 15px #ff9a00;
}

/* ================= Inputs ================= */
input {
  width: 100%;
  padding: 14px 20px;
  margin: 10px 0;
  border-radius: 20px;
  border: none;
  font-size: 16px;
  outline: none;
  background: rgba(34,34,34,0.85);
  color: white;
  transition: 0.3s;
  box-shadow: inset 0 0 5px #000;
}

input:focus {
  box-shadow: 0 0 12px #ff9a00;
  background: rgba(26,26,26,0.95);
}

/* ================= Buttons ================= */
button {
  width: 100%;
  padding: 14px;
  border-radius: 25px;
  border: none;
  background: linear-gradient(45deg, #ff9a00, #ffaa33);
  color: white;
  font-weight: 700;
  font-size: 18px;
  margin-top: 15px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 15px #ff9a00;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px #ffaa33;
}

/* ================= Switch Links ================= */
.switch {
  margin-top: 15px;
  font-size: 14px;
  color: #aaa;
  cursor: pointer;
}
.switch span {
  color: #ff9a00;
  text-decoration: underline;
  transition: color 0.3s;
}
.switch span:hover {
  color: #ffaa33;
}

/* ================= Error Messages ================= */
.error {
  color: #ff5252;
  font-size: 14px;
  margin-top: 5px;
  min-height: 18px;
  opacity: 0;
  transition: opacity 0.4s ease;
}

/* ================= Fade Animation ================= */
.fade {
  animation: fadeIn 0.6s ease forwards;
}
@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}

/* ================= Responsive ================= */
@media(max-width:400px){
  .container { padding: 40px 20px; }
  input, button { padding: 12px; font-size: 16px; }
}
</style>
</head>
<body>

<div class="container fade" id="loginContainer">
  <!-- Logo Section -->
  <img src="logo.png" alt="Malone Aviator Logo" id="logo">
  <h2 id="formTitle">Login</h2>

  <!-- Login Form -->
  <div id="loginForm">
    <input type="text" id="loginPhone" placeholder="Kenya Phone Number (10 digits)">
    <div class="error" id="loginError"></div>
    <button onclick="login()">Login</button>
    <div class="switch">Don't have an account? <span onclick="showRegister()">Register</span></div>
  </div>

  <!-- Registration Form -->
  <div id="registerForm" style="display:none;">
    <input type="text" id="firstName" placeholder="First Name">
    <input type="text" id="secondName" placeholder="Second Name">
    <input type="text" id="nickname" placeholder="Nickname">
    <input type="text" id="phone" placeholder="Kenya Phone Number (10 digits)">
    <div class="error" id="registerError"></div>
    <button onclick="register()">Register</button>
    <div class="switch">Already have an account? <span onclick="showLogin()">Login</span></div>
  </div>

  <!-- Footer -->
  <div style="margin-top:20px; font-size:12px; color:#aaa;">© 2026 Malone Aviator</div>
</div>

<script>
// ================= Form fade switch =================
function fadeSwitch(show, hide) {
  hide.style.opacity = 1;
  hide.style.transition = "opacity 0.4s";
  hide.style.opacity = 0;
  setTimeout(() => {
    hide.style.display = 'none';
    show.style.display = 'block';
    show.style.opacity = 0;
    setTimeout(() => show.style.opacity = 1, 10);
  }, 400);
}

function showRegister() {
  fadeSwitch(document.getElementById('registerForm'), document.getElementById('loginForm'));
  document.getElementById('formTitle').innerText='Register';
}
function showLogin() {
  fadeSwitch(document.getElementById('loginForm'), document.getElementById('registerForm'));
  document.getElementById('formTitle').innerText='Login';
}

// ================= Registration =================
function register() {
  const firstName=document.getElementById('firstName').value.trim();
  const secondName=document.getElementById('secondName').value.trim();
  const nickname=document.getElementById('nickname').value.trim();
  let phone=document.getElementById('phone').value.trim();
  const errorDiv=document.getElementById('registerError');

  if(!firstName || !secondName || !nickname || !phone) {
    errorDiv.innerText='Please fill all fields';
    errorDiv.style.opacity = 1;
    return;
  }
  if(!/^\d{10}$/.test(phone)) {
    errorDiv.innerText='Phone must be 10 digits';
    errorDiv.style.opacity = 1;
    return;
  }
  if(localStorage.getItem(phone)) {
    errorDiv.innerText='Phone already registered';
    errorDiv.style.opacity = 1;
    return;
  }
  const userData={firstName, secondName, nickname, phone, balance:1000};
  localStorage.setItem(phone, JSON.stringify(userData));
  alert('Registered successfully! Now login.');
  showLogin();
  errorDiv.style.opacity = 0;
}

// ================= Login =================
function login() {
  const phone=document.getElementById('loginPhone').value.trim();
  const errorDiv=document.getElementById('loginError');

  if(!/^\d{10}$/.test(phone)) {
    errorDiv.innerText='Enter valid 10-digit phone number';
    errorDiv.style.opacity = 1;
    return;
  }
  const data=localStorage.getItem(phone);
  if(!data) {
    errorDiv.innerText='Phone not registered';
    errorDiv.style.opacity = 1;
    return;
  }
  localStorage.setItem('currentUser', phone);
  alert('Login successful! Redirecting...');
  window.location.href='game.html';
}
</script>

</body>
</html>
